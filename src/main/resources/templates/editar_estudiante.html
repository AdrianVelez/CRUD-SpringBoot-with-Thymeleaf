<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar Estudiante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>


<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark" >

    <div class="container-fluid">
        <a class="navbar-brand" href="#">Control de Estudiantes</a>

        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/estudiantes}">Listar Estudiantes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/estudiantes/nuevo}">Crear Estudiante</a>
                </li>
            </ul>

            <span class="navbar-text">
       Cabecera de prueba Thymeleaf
           </span>
        </div>
    </div>
</nav>


<div class="container">
    <div class="row">
        <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card ">
            <h1 class="text-center" >Edición de Estudiante</h1>
            <div class="card-body">
                <form th:action="@{/estudiantes/{id}(id=${estudiante.id})}" th:object ="${estudiante}" method="POST">
                    <div class="form-group">
                        <label> Nombre : </label>
                        <input type="text" name="nombre" th:field="*{nombre}" class="form-control" placeholder="Digite su nombre :" required>
                    </div>
                    <br>
                    <div class="form-group">
                        <label> Apellido : </label>
                        <input type="text" name="apellido" th:field="*{apellido}" class="form-control" placeholder="Digite su apellido :" required>
                    </div>
                    <br>
                    <div class="form-group">
                        <label> Email : </label>
                        <input type="text" name="email" th:field="*{email}" class="form-control" placeholder="Digite su email :" required>
                    </div>
                    <br>
                    <div class="box-footer">
                        <button class="btn btn-success" >Guardar</button>
                    </div>
                </form>
            </div>

        </div>
    </div>

</div>

</body>
</html>
