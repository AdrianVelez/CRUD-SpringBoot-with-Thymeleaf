<!DOCTYPE html>
<html xmlns:th = "http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de estudiantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>


<nav class="navbar navbar-expand-lg bg-body-tertiary" data-bs-theme="dark" >

    <div class="container-fluid">
        <a class="navbar-brand" href="#">Control de Estudiantes</a>

        <div class="collapse navbar-collapse" id="navbarText">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/estudiantes}">Listar Estudiantes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" th:href="@{/estudiantes/nuevo}">Crear Estudiante</a>
                </li>
            </ul>

            <span class="navbar-text">
       Cabecera de prueba Thymeleaf
           </span>
        </div>
    </div>
</nav>



    <div class="container">
        <div class="row">
            <h1>Lista de estudiantes</h1>
        </div>
        <div class="col-lg-3">
            <a th:href="@{/estudiantes/nuevo}" class="btn btn-primary btm-sm mb3"> Agregar Estudiante</a>
        </div>
        <br>

        <table class="table table-striped table-bordered">
            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Email</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="estudiante: ${estudiantes}">
                <td th:text="${estudiante.nombre}">Nombre</td>
                <td th:text="${estudiante.apellido}">Apellido</td>
                <td th:text="${estudiante.email}">Email</td>
                <td>
                    <a th:href="@{estudiantes/editar/{id}(id = ${estudiante.id})}" class="btn btn-info">Editar</a>
                    <a th:href="@{estudiantes/eliminar/{id}(id = ${estudiante.id})}" class="btn btn-danger">Eliminar</a>
                </td>

            </tr>

            </tbody>
        </table>

    </div>

</body>
</html>
